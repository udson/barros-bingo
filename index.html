<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barros' Bingo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Abril+Fatface&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────
   TOKENS
───────────────────────────────────────── */
:root {
  --bg:       #0d0b1e;
  --surface:  #16132e;
  --border:   #2a2550;
  --gold:     #ffd93d;
  --red:      #ff4757;
  --teal:     #2ed573;
  --muted:    #7b72a8;
  --text:     #e8e0ff;

  --ball-size:      180px;
  --ball-font:      4.5rem;
  --mini-size:      46px;
  --mini-font:      1rem;
}

/* TV overrides */
body.tv-mode {
  --ball-size:  min(28vw, 340px);
  --ball-font:  clamp(3.5rem, 10vw, 7rem);
  --mini-size:  clamp(50px, 5.5vw, 68px);
  --mini-font:  clamp(1.2rem, 2.5vw, 1.8rem);
}

/* ─────────────────────────────────────────
   RESET / BASE
───────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  overflow-x: hidden;
  position: relative;
}

/* Starfield */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(1px 1px at 10% 15%, rgba(255,217,61,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 40%, rgba(46,213,115,.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 20%, rgba(255,255,255,.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 70%, rgba(255,71,87,.3)  0%, transparent 100%),
    radial-gradient(1px 1px at 45% 80%, rgba(165,94,234,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 35%, rgba(255,255,255,.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 20% 65%, rgba(30,144,255,.3) 0%, transparent 100%),
    radial-gradient(2px 2px at 70% 50%, rgba(255,217,61,.2) 0%, transparent 100%);
  pointer-events: none; z-index: 0;
}

/* ─────────────────────────────────────────
   LAYOUT NORMAL
───────────────────────────────────────── */
.app {
  position: relative; z-index: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── Top bar ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.75rem 1.25rem;
  border-bottom: 1px solid var(--border);
  background: rgba(13,11,30,.85);
  backdrop-filter: blur(10px);
  position: sticky; top: 0; z-index: 100;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.topbar-brand {
  font-family: 'Abril Fatface', serif;
  font-size: clamp(1.6rem, 5vw, 2.4rem);
  line-height: 1;
  background: linear-gradient(135deg, #ffd93d, #ff6b35, #ff4757);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 12px rgba(255,107,53,.4));
  letter-spacing: 2px;
}

.topbar-controls {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  flex-wrap: wrap;
}

/* Range inputs */
.range-group {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.35rem 0.7rem;
}

.range-group label {
  font-size: 0.65rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 700;
}

.range-group input[type="number"] {
  background: transparent;
  border: none;
  color: var(--gold);
  font-family: 'Bebas Neue';
  font-size: 1.3rem;
  width: 52px;
  text-align: center;
  outline: none;
  -moz-appearance: textfield;
}
.range-group input[type="number"]::-webkit-inner-spin-button { display: none; }

.range-sep { color: var(--muted); font-size: 0.8rem; }

/* Icon buttons */
.icon-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--muted);
  font-size: 0.75rem;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 0.45rem 0.9rem;
  cursor: pointer;
  display: flex; align-items: center; gap: 0.4rem;
  transition: all .18s;
  white-space: nowrap;
}
.icon-btn:hover { border-color: var(--gold); color: var(--gold); }
.icon-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

.icon-btn.tv-active {
  border-color: var(--teal);
  color: var(--teal);
  background: rgba(46,213,115,.08);
}

/* ─────────────────────────────────────────
   MAIN CONTENT (normal)
───────────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1.5rem 1.25rem 2.5rem;
  gap: 1.75rem;
}

/* ── Ball stage ── */
.stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.1rem;
}

.ball-wrap {
  width: var(--ball-size);
  height: var(--ball-size);
  position: relative;
}

.ball {
  width: 100%; height: 100%;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%,
    #ffffff 0%, var(--gold) 30%, #e67e00 75%, #7a3d00 100%);
  display: flex; align-items: center; justify-content: center;
  box-shadow:
    0 0 0 6px rgba(255,217,61,.2),
    0 0 40px rgba(255,217,61,.3),
    0 20px 60px rgba(0,0,0,.5),
    inset 0 -10px 30px rgba(0,0,0,.3);
  position: relative;
  transition: transform .3s;
}

.ball::after {
  content: '';
  position: absolute;
  top: 18%; left: 22%;
  width: 28%; height: 18%;
  background: rgba(255,255,255,.5);
  border-radius: 50%;
  filter: blur(4px);
  transform: rotate(-30deg);
}

.ball-number {
  font-family: 'Bebas Neue', sans-serif;
  font-size: var(--ball-font);
  color: #fff;
  text-shadow: 0 3px 10px rgba(0,0,0,.5);
  line-height: 1;
  position: relative; z-index: 1;
  transition: opacity .1s;
}

.ball-number.idle { color: rgba(255,255,255,.3); font-size: calc(var(--ball-font) * .65); }

.counter {
  font-size: 0.78rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 700;
  text-align: center;
}
.counter span { color: var(--gold); font-family: 'Bebas Neue'; font-size: 1rem; }

/* Draw button */
.btn-draw {
  background: linear-gradient(135deg, #ffd93d, #ff6b35);
  border: none;
  border-radius: 50px;
  color: #1a0a00;
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1.2rem, 3vw, 1.6rem);
  letter-spacing: 3px;
  padding: clamp(0.75rem,2vw,1rem) clamp(2.5rem,5vw,3.5rem);
  cursor: pointer;
  box-shadow: 0 8px 30px rgba(255,107,53,.4), 0 2px 0 rgba(0,0,0,.3);
  transition: all .15s;
  position: relative; top: 0;
}
.btn-draw:hover:not(:disabled) {
  transform: translateY(-3px);
  box-shadow: 0 14px 35px rgba(255,107,53,.5), 0 2px 0 rgba(0,0,0,.3);
}
.btn-draw:active:not(:disabled) {
  transform: translateY(2px); top: 2px;
  box-shadow: 0 4px 15px rgba(255,107,53,.3);
}
.btn-draw:disabled {
  opacity: .45; cursor: not-allowed;
  background: linear-gradient(135deg, #6b5a1a, #7a3a1a);
  box-shadow: none;
}

.done-msg {
  display: none;
  font-family: 'Abril Fatface', serif;
  font-size: clamp(1rem, 3vw, 1.5rem);
  color: var(--teal);
  text-align: center;
  text-shadow: 0 0 20px rgba(46,213,115,.5);
  animation: popIn .5s ease forwards;
}

/* ── Drawn section ── */
.drawn-section {
  width: 100%;
  max-width: 820px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 1.2rem 1.25rem;
  box-shadow: 0 8px 40px rgba(0,0,0,.4);
}

.drawn-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.drawn-header h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  letter-spacing: 3px;
  color: var(--muted);
}

.drawn-header-right {
  display: flex; align-items: center; gap: 0.7rem; flex-wrap: wrap;
}

.total-badge {
  font-size: 0.72rem;
  background: rgba(255,217,61,.1);
  border: 1px solid rgba(255,217,61,.3);
  color: var(--gold);
  padding: 0.28rem 0.7rem;
  border-radius: 20px;
  font-weight: 700;
  white-space: nowrap;
}

/* Sort toggle */
.sort-toggle {
  display: flex;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 3px; gap: 3px;
}
.sort-btn {
  background: transparent; border: none;
  border-radius: 7px;
  color: var(--muted);
  font-family: 'Nunito', sans-serif;
  font-size: 0.68rem; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 0.28rem 0.65rem;
  cursor: pointer; transition: all .18s; white-space: nowrap;
}
.sort-btn.active { background: var(--border); color: var(--gold); }
.sort-btn:hover:not(.active) { color: var(--text); }

/* Mini balls */
.drawn-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 0.45rem;
}

.mini-ball {
  width: var(--mini-size);
  height: var(--mini-size);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: var(--mini-font);
  color: #fff;
  box-shadow: 0 3px 12px rgba(0,0,0,.4);
  animation: popIn .35s cubic-bezier(.175,.885,.32,1.275) forwards;
  flex-shrink: 0;
  position: relative;
  cursor: default;
}
.mini-ball::after {
  content: '';
  position: absolute; top: 15%; left: 20%;
  width: 25%; height: 15%;
  background: rgba(255,255,255,.5);
  border-radius: 50%;
  filter: blur(2px);
}
.mini-ball.latest {
  box-shadow: 0 3px 12px rgba(0,0,0,.4), 0 0 0 3px rgba(255,217,61,.85);
}
.mini-ball.no-anim { animation: none; }

.empty-state {
  color: var(--muted); font-size: .85rem;
  text-align: center; padding: 1rem 0;
  width: 100%; letter-spacing: 1px;
}

/* Ball colors */
.c0 { background: radial-gradient(circle at 35% 35%, #ff6b9d, #c0006a); }
.c1 { background: radial-gradient(circle at 35% 35%, #74b9ff, #0055cc); }
.c2 { background: radial-gradient(circle at 35% 35%, #55efc4, #00897b); }
.c3 { background: radial-gradient(circle at 35% 35%, #fdcb6e, #d4720d); }
.c4 { background: radial-gradient(circle at 35% 35%, #a29bfe, #6c3dcf); }
.c5 { background: radial-gradient(circle at 35% 35%, #fd79a8, #b3003a); }
.c6 { background: radial-gradient(circle at 35% 35%, #00cec9, #006b68); }
.c7 { background: radial-gradient(circle at 35% 35%, #e17055, #8b2500); }

/* ─────────────────────────────────────────
   KEYFRAMES
───────────────────────────────────────── */
@keyframes popIn {
  0%   { transform: scale(.5); opacity: 0; }
  60%  { transform: scale(1.2); opacity: 1; }
  80%  { transform: scale(.95); }
  100% { transform: scale(1); }
}
@keyframes ballSpin {
  0%   { transform: rotate(0deg) scale(1); }
  25%  { transform: rotate(15deg) scale(1.05); }
  50%  { transform: rotate(-10deg) scale(.97); }
  75%  { transform: rotate(8deg) scale(1.03); }
  100% { transform: rotate(0deg) scale(1); }
}
@keyframes numberFlicker {
  0%, 100% { opacity: 1; } 50% { opacity: .3; }
}
@keyframes ballPop {
  0%   { box-shadow: 0 0 0 6px rgba(255,217,61,.2), 0 0 40px rgba(255,217,61,.3), 0 20px 60px rgba(0,0,0,.5); }
  50%  { box-shadow: 0 0 0 12px rgba(255,217,61,.5), 0 0 80px rgba(255,217,61,.7), 0 20px 60px rgba(0,0,0,.5); transform: scale(1.07); }
  100% { box-shadow: 0 0 0 6px rgba(255,217,61,.2), 0 0 40px rgba(255,217,61,.3), 0 20px 60px rgba(0,0,0,.5); }
}
@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: .3; }
}
@keyframes tvFadeIn {
  from { opacity: 0; transform: scale(.97); }
  to   { opacity: 1; transform: scale(1); }
}

.ball.spinning    { animation: ballSpin .15s ease-in-out infinite; }
.ball.popping     { animation: ballPop .5s ease-out; }
.ball-number.flickering { animation: numberFlicker .12s linear infinite; }
.ball-number.appearing  { animation: popIn .4s cubic-bezier(.175,.885,.32,1.275) forwards; }

/* Confetti */
.confetti-layer {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 999; overflow: hidden;
}
.confetti-piece {
  position: absolute; top: -20px;
  border-radius: 2px;
  animation: confettiFall linear forwards;
}

/* ─────────────────────────────────────────
   TV MODE
───────────────────────────────────────── */
body.tv-mode {
  overflow: hidden;
  height: 100vh;
}

body.tv-mode .app {
  height: 100vh;
  overflow: hidden;
}

/* Hide topbar controls that don't make sense on TV */
body.tv-mode .topbar {
  padding: 0.6rem 1.5rem;
}

body.tv-mode .range-group { display: none; }

/* TV layout: two-panel flex */
body.tv-mode .main {
  flex-direction: row;
  align-items: stretch;
  padding: 0;
  gap: 0;
  overflow: hidden;
  flex: 1;
}

/* Left panel */
body.tv-mode .tv-left {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: clamp(1rem, 2.5vh, 2rem);
  padding: clamp(1.5rem, 3vw, 3rem);
  flex: 0 0 42%;
  border-right: 1px solid var(--border);
  background: rgba(22,19,46,.5);
}

/* Right panel */
body.tv-mode .tv-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: clamp(1.2rem, 2.5vw, 2.5rem);
  overflow: hidden;
}

body.tv-mode .tv-right .drawn-section {
  flex: 1;
  max-width: none;
  background: transparent;
  border: none;
  box-shadow: none;
  padding: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

body.tv-mode .tv-right .drawn-header {
  margin-bottom: clamp(0.5rem, 1.5vh, 1.2rem);
  flex-shrink: 0;
}

body.tv-mode .tv-right .drawn-header h2 {
  font-size: clamp(1.2rem, 3vw, 2.2rem);
  white-space: nowrap;
}

body.tv-mode .tv-right .drawn-grid {
  overflow-y: auto;
  flex: 1;
  gap: clamp(0.4rem, 1vw, 0.9rem);
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  align-content: flex-start;
  padding: 0.5rem;
}

body.tv-mode .stage { gap: clamp(0.75rem, 2vh, 1.5rem); }

/* TV counter bigger */
body.tv-mode .counter {
  font-size: clamp(0.7rem, 1.5vw, 1rem);
  letter-spacing: 3px;
}
body.tv-mode .counter span { font-size: clamp(0.9rem, 2vw, 1.4rem); }

/* TV draw button bigger */
body.tv-mode .btn-draw {
  font-size: clamp(1.2rem, 3vw, 2rem);
  padding: clamp(0.75rem, 2vh, 1.2rem) clamp(2rem, 5vw, 4rem);
}

/* TV done msg */
body.tv-mode .done-msg {
  font-size: clamp(1rem, 3vw, 2rem);
}

/* Hide/show helpers */
.tv-only  { display: none; }
.hide-tv  { display: flex; } /* flex because most are flex */

body.tv-mode .tv-only { display: flex; }
body.tv-mode .hide-tv { display: none !important; }

/* TV right panel header label */
.tv-panel-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(0.9rem, 2vw, 1.6rem);
  letter-spacing: 4px;
  color: var(--muted);
  margin-bottom: clamp(0.5rem, 1.5vh, 1rem);
  flex-shrink: 0;
}

/* ─────────────────────────────────────────
   RESPONSIVE (normal mode only)
───────────────────────────────────────── */

/* Small phones */
@media (max-width: 420px) {
  :root {
    --ball-size: 140px;
    --ball-font: 3.5rem;
    --mini-size: 38px;
    --mini-font: 0.85rem;
  }
  .topbar { padding: 0.5rem 1rem; }
  .topbar-brand { font-size: 1.5rem; }
}

/* Medium phones */
@media (min-width: 421px) and (max-width: 640px) {
  :root {
    --ball-size: 160px;
    --ball-font: 4rem;
    --mini-size: 42px;
    --mini-font: 0.9rem;
  }
}

/* Tablets */
@media (min-width: 641px) and (max-width: 1024px) {
  :root {
    --ball-size: 190px;
    --ball-font: 4.8rem;
    --mini-size: 50px;
    --mini-font: 1.05rem;
  }
}

/* Desktop */
@media (min-width: 1025px) {
  :root {
    --ball-size: 210px;
    --ball-font: 5.2rem;
    --mini-size: 54px;
    --mini-font: 1.1rem;
  }
  .main { padding: 2rem 2rem 3rem; }
  .drawn-section { padding: 1.4rem 1.6rem; }
}

/* Large desktop */
@media (min-width: 1400px) {
  :root {
    --mini-size: 58px;
    --mini-font: 1.15rem;
  }
}
</style>
</head>
<body>

<div class="confetti-layer" id="confetti"></div>

<div class="app">

  <!-- ── Top bar ── -->
  <header class="topbar">
    <div class="topbar-brand">Barros' Bingo</div>

    <div class="topbar-controls">

      <!-- Range (hidden in TV mode) -->
      <div class="range-group hide-tv">
        <label>De</label>
        <input type="number" id="minVal" value="1" min="1" max="999" aria-label="Número mínimo">
        <span class="range-sep">—</span>
        <label>Até</label>
        <input type="number" id="maxVal" value="75" min="1" max="999" aria-label="Número máximo">
      </div>

      <!-- Reset -->
      <button class="icon-btn" onclick="confirmReset()" title="Reiniciar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
        </svg>
        Reiniciar
      </button>

      <!-- Mute toggle -->
      <button class="icon-btn" id="muteBtn" onclick="toggleMute()" title="Som">
        <svg id="iconSound" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
        <svg id="iconMute" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
        </svg>
        Som
      </button>

      <!-- TV toggle -->
      <button class="icon-btn" id="tvBtn" onclick="toggleTV()" title="Modo TV">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        Modo TV
      </button>

    </div>
  </header>

  <!-- ── Main ── -->
  <main class="main" id="mainArea">

    <!-- Left panel (TV) / center column (normal) -->
    <div class="tv-left" id="leftPanel">

      <!-- Ball stage -->
      <div class="stage">
        <div class="ball-wrap">
          <div class="ball" id="ball">
            <div class="ball-number idle" id="ballNumber">?</div>
          </div>
        </div>

        <div class="counter" id="counter">Nenhum número sorteado ainda</div>

        <button class="btn-draw" id="drawBtn" onclick="drawNumber()">SORTEAR</button>

        <div class="done-msg" id="doneMsg">🎉 Todos os números foram sorteados!</div>
      </div>

      <!-- Config inside TV left panel -->
      <div class="tv-only" style="flex-direction:column; align-items:center; gap:0.4rem; margin-top:0.5rem;">
        <span style="font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:700;">Faixa de números</span>
        <div style="display:flex;align-items:center;gap:0.5rem;">
          <div class="range-group">
            <label>De</label>
            <input type="number" id="minValTV" value="1" min="1" max="999" aria-label="Número mínimo TV">
            <span class="range-sep">—</span>
            <label>Até</label>
            <input type="number" id="maxValTV" value="75" min="1" max="999" aria-label="Número máximo TV">
          </div>
        </div>
      </div>

    </div>

    <!-- Right panel (TV) / below stage (normal) -->
    <div class="tv-right" id="rightPanel">
      <div class="drawn-section">
        <div class="drawn-header">
          <h2>Sorteados</h2>
          <div class="drawn-header-right">
            <div class="total-badge" id="drawnTotal">0 números</div>
            <div class="sort-toggle">
              <button class="sort-btn active" id="btnSortDraw" onclick="setSort('draw')">Sorteio</button>
              <button class="sort-btn"        id="btnSortAsc"  onclick="setSort('asc')">Crescente</button>
            </div>
          </div>
        </div>
        <div class="drawn-grid" id="drawnGrid">
          <div class="empty-state">Os números sorteados aparecerão aqui</div>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
// ─── State ───────────────────────────────
let pool       = [];
let drawn      = [];
let isAnimating = false;
let sortOrder  = 'draw';
let tvMode     = false;

// ─── Pool ────────────────────────────────
function getMin() {
  return tvMode
    ? parseInt(document.getElementById('minValTV').value)
    : parseInt(document.getElementById('minVal').value);
}
function getMax() {
  return tvMode
    ? parseInt(document.getElementById('maxValTV').value)
    : parseInt(document.getElementById('maxVal').value);
}

// Keep both input pairs in sync
function syncInputs(sourceId) {
  const pairs = { minVal:'minValTV', maxVal:'maxValTV', minValTV:'minVal', maxValTV:'maxVal' };
  const mirror = document.getElementById(pairs[sourceId]);
  const src    = document.getElementById(sourceId);
  if (mirror && src) mirror.value = src.value;
}

['minVal','maxVal','minValTV','maxValTV'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('change', () => {
    syncInputs(id);
    if (drawn.length === 0) buildPool();
  });
});

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function buildPool() {
  const min = getMin(), max = getMax();
  if (isNaN(min) || isNaN(max) || min > max) return;
  pool = [];
  for (let i = min; i <= max; i++) pool.push(i);
  shuffleArray(pool);
}

// ─── UI helpers ──────────────────────────
function getColorClass(num) { return `c${num % 8}`; }

function updateCounter() {
  const total = pool.length + drawn.length;
  const el    = document.getElementById('counter');
  el.innerHTML = drawn.length === 0
    ? 'Nenhum número sorteado ainda'
    : `<span>${drawn.length}</span> de <span>${total}</span> números sorteados`;
}

function setSort(order) {
  sortOrder = order;
  document.getElementById('btnSortDraw').classList.toggle('active', order === 'draw');
  document.getElementById('btnSortAsc') .classList.toggle('active', order === 'asc');
  updateDrawnGrid(false);
}

function updateDrawnGrid(animate = true) {
  const grid  = document.getElementById('drawnGrid');
  const total = document.getElementById('drawnTotal');
  total.textContent = `${drawn.length} número${drawn.length !== 1 ? 's' : ''}`;

  if (drawn.length === 0) {
    grid.innerHTML = '<div class="empty-state">Os números sorteados aparecerão aqui</div>';
    return;
  }

  const lastDrawn = drawn[drawn.length - 1];
  let list;

  if (sortOrder === 'asc') {
    list = [...drawn].sort((a, b) => a - b).map(num => ({
      num,
      label: `${drawn.indexOf(num) + 1}º sorteado`,
      isLatest: num === lastDrawn
    }));
  } else {
    list = drawn.map((num, idx) => ({
      num,
      label: `${idx + 1}º sorteado`,
      isLatest: idx === drawn.length - 1
    }));
  }

  grid.innerHTML = '';
  list.forEach(({ num, label, isLatest }) => {
    const b = document.createElement('div');
    b.className = `mini-ball ${getColorClass(num)}${isLatest ? ' latest' : ''}${(!animate || !isLatest) ? ' no-anim' : ''}`;
    b.textContent = num;
    b.title = label;
    grid.appendChild(b);
  });

  const latest = grid.querySelector('.latest');
  if (latest) latest.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ─── Confetti ────────────────────────────
function spawnConfetti(count = 35) {
  const c = document.getElementById('confetti');
  const colors = ['#ffd93d','#ff4757','#2ed573','#1e90ff','#ff6b35','#a55eea','#fd79a8'];
  c.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left   = Math.random() * 100 + 'vw';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.width  = (8 + Math.random() * 8) + 'px';
    p.style.height = (8 + Math.random() * 8) + 'px';
    p.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
    p.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    p.style.animationDelay    = (Math.random() * .5) + 's';
    c.appendChild(p);
  }
  setTimeout(() => { c.innerHTML = ''; }, 4000);
}

// ─── Draw ────────────────────────────────
function drawNumber() {
  if (isAnimating) return;
  if (pool.length === 0 && drawn.length === 0) buildPool();
  if (pool.length === 0) return;

  isAnimating = true;
  document.getElementById('drawBtn').disabled = true;

  const ball    = document.getElementById('ball');
  const ballNum = document.getElementById('ballNumber');
  const result  = pool.shift();
  const min = getMin(), max = getMax();

  ball.classList.add('spinning');
  ballNum.classList.remove('idle', 'appearing');
  ballNum.classList.add('flickering');

  let tick = 0;
  const TICKS = 20;
  const iv = setInterval(() => {
    ballNum.textContent = Math.floor(Math.random() * (max - min + 1)) + min;
    if (tick % 2 === 0) playTick();
    if (++tick >= TICKS) {
      clearInterval(iv);

      ball.classList.remove('spinning');
      ballNum.classList.remove('flickering');
      ballNum.classList.add('appearing');
      ballNum.textContent = result;

      setTimeout(() => {
        ball.classList.add('popping');
        setTimeout(() => ball.classList.remove('popping'), 500);
      }, 50);

      playReveal();
      spawnConfetti(tvMode ? 55 : 38);

      drawn.push(result);
      updateCounter();
      updateDrawnGrid(true);

      if (pool.length === 0) {
        document.getElementById('doneMsg').style.display = 'block';
        setTimeout(playFanfare, 200);
      } else {
        document.getElementById('drawBtn').disabled = false;
      }
      isAnimating = false;
    }
  }, 65);
}

// ─── Reset ───────────────────────────────
function confirmReset() {
  if (drawn.length === 0) {
    // Se não há números sorteados, resetar direto sem aviso
    resetGame();
    return;
  }

  // Pedir confirmação
  if (confirm('Tem certeza que deseja reiniciar? Todos os números sorteados serão apagados.')) {
    resetGame();
  }
}

function resetGame() {
  if (isAnimating) return;
  pool = []; drawn = [];
  const ball    = document.getElementById('ball');
  const ballNum = document.getElementById('ballNumber');
  ball.className   = 'ball';
  ballNum.className = 'ball-number idle';
  ballNum.textContent = '?';
  document.getElementById('doneMsg').style.display = 'none';
  document.getElementById('drawBtn').disabled = false;
  document.getElementById('confetti').innerHTML = '';
  updateCounter();
  updateDrawnGrid();
  buildPool();
}

// ─── TV mode ─────────────────────────────
function toggleTV() {
  tvMode = !tvMode;
  document.body.classList.toggle('tv-mode', tvMode);
  document.getElementById('tvBtn').classList.toggle('tv-active', tvMode);
  document.getElementById('tvBtn').innerHTML = tvMode
    ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg> Saír TV`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg> Modo TV`;

  // Move drawn section between panels depending on mode
  const drawnSection = document.querySelector('.drawn-section');
  const leftPanel    = document.getElementById('leftPanel');
  const rightPanel   = document.getElementById('rightPanel');

  if (tvMode) {
    rightPanel.style.display = 'flex';
    rightPanel.style.flexDirection = 'column';
    rightPanel.appendChild(drawnSection);
  } else {
    rightPanel.appendChild(drawnSection); // stays in right; CSS hides rightPanel in normal mode
  }

  // Sync TV inputs with main inputs
  document.getElementById('minValTV').value = document.getElementById('minVal').value;
  document.getElementById('maxValTV').value = document.getElementById('maxVal').value;

  // Try fullscreen
  if (tvMode) {
    document.documentElement.requestFullscreen?.().catch(() => {});
  } else {
    document.exitFullscreen?.().catch(() => {});
  }
}

// ESC exits TV
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && tvMode) {
    tvMode = false;
    document.body.classList.remove('tv-mode');
    document.getElementById('tvBtn').classList.remove('tv-active');
    document.getElementById('tvBtn').innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg> Modo TV`;
  }
});

// ─── Normal layout: right panel is just a wrapper ──
// In normal mode the drawn-section flows naturally inside rightPanel
// which is a block-level sibling below leftPanel in the flex column.
// We need rightPanel visible in normal mode.
document.getElementById('rightPanel').style.flex = '1';
document.getElementById('rightPanel').style.width = '100%';
document.getElementById('rightPanel').style.maxWidth = '820px';
document.getElementById('rightPanel').style.margin = '0 auto';

// ─── Init ────────────────────────────────
buildPool();
updateCounter();
updateDrawnGrid();

// ─── Audio ───────────────────────────────
let audioCtx  = null;
let muted     = false;

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function toggleMute() {
  muted = !muted;
  document.getElementById('iconSound').style.display = muted ? 'none'  : 'block';
  document.getElementById('iconMute') .style.display = muted ? 'block' : 'none';
  document.getElementById('muteBtn').classList.toggle('tv-active', muted);
}

// Short mechanical "tick" — filtered noise burst
function playTick() {
  if (muted) return;
  const ctx  = getCtx();
  const t    = ctx.currentTime;
  const buf  = ctx.createBuffer(1, ctx.sampleRate * 0.04, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 3);
  const src  = ctx.createBufferSource();
  src.buffer = buf;
  const filt = ctx.createBiquadFilter();
  filt.type  = 'bandpass';
  filt.frequency.value = 1800;
  filt.Q.value = 0.8;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.18, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
  src.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
  src.start(t);
}

// Rising arpeggio "ta-da" on reveal
function playReveal() {
  if (muted) return;
  const ctx   = getCtx();
  // Notes: C5 E5 G5  (523, 659, 784 Hz)
  const notes = [523.25, 659.25, 783.99];
  notes.forEach((freq, i) => {
    const t    = ctx.currentTime + i * 0.10;
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type   = 'sine';
    osc.frequency.setValueAtTime(freq, t);
    // slight pitch-up shimmer
    osc.frequency.linearRampToValueAtTime(freq * 1.012, t + 0.12);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.32, t + 0.025);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
    // bell-like 2nd harmonic
    const osc2 = ctx.createOscillator();
    const g2   = ctx.createGain();
    osc2.type  = 'sine';
    osc2.frequency.setValueAtTime(freq * 2, t);
    g2.gain.setValueAtTime(0.08, t);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    osc.connect(gain);   gain.connect(ctx.destination);
    osc2.connect(g2);    g2.connect(ctx.destination);
    osc.start(t);  osc.stop(t + 0.5);
    osc2.start(t); osc2.stop(t + 0.3);
  });
}

// Fanfare when all numbers are done — C E G C (octave)
function playFanfare() {
  if (muted) return;
  const ctx   = getCtx();
  const notes = [523.25, 659.25, 783.99, 1046.50];
  notes.forEach((freq, i) => {
    const t    = ctx.currentTime + i * 0.13;
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type   = 'triangle';
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(0.28, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.65);
  });
}
</script>
</body>
</html>
